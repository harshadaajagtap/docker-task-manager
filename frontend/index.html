<!DOCTYPE html>
<html>
<head>
<title>Docker Task Manager</title>

<style>

body{
font-family:Segoe UI,Arial;
background:#eef2f7;
margin:0;
}

header{
background:#1f2937;
color:white;
padding:20px;
text-align:center;
font-size:22px;
}

.container{
max-width:700px;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
margin-top:0;
color:#333;
}

input{
padding:12px;
width:70%;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:12px 16px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.task{
display:flex;
justify-content:space-between;
align-items:center;
background:#f9fafb;
margin-top:10px;
padding:12px;
border-radius:6px;
}

.delete{
background:#ef4444;
}

.delete:hover{
background:#dc2626;
}

footer{
text-align:center;
margin-top:30px;
color:#777;
}

</style>

</head>

<body>

<header>
🐳 Docker Task Manager Dashboard
</header>

<div class="container">

<h2>Manage Your Tasks</h2>

<input id="taskInput" placeholder="Enter new task">
<button onclick="addTask()">Add Task</button>

<div id="taskList"></div>

</div>

<footer>
Docker Microservices Demo Project
</footer>

<script>

async function loadTasks(){

try{

let res = await fetch("http://localhost:5000/tasks")
let data = await res.json()

let list = document.getElementById("taskList")
list.innerHTML=""

data.forEach(t=>{

let div=document.createElement("div")
div.className="task"

div.innerHTML=`
<span>${t.task}</span>
<button class="delete" onclick="deleteTask('${t.task}')">Delete</button>
`

list.appendChild(div)

})

}catch(e){
console.log("Backend not ready")
}

}

async function addTask(){

let task=document.getElementById("taskInput").value

if(task===""){
alert("Enter a task")
return
}

await fetch("http://localhost:5000/tasks",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({task:task})
})

document.getElementById("taskInput").value=""

loadTasks()

}

async function deleteTask(task){

await fetch("http://localhost:5000/tasks/"+task,{
method:"DELETE"
})

loadTasks()

}

loadTasks()

</script>

</body>
</html>
