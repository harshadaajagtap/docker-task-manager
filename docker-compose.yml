services:

  backend:
    build: ./backend
    container_name: task-backend
    ports:
      - "5000:5000"
    depends_on:
      - db

  db:
    image: mongo:latest
    container_name: task-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  frontend:
    image: nginx:latest
    container_name: task-frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend

volumes:
  mongo-data: